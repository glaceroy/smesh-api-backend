replicaCount: 1

servicePort: 8443

ports:
  - name: https
    containerPort: 8443
  - name: health
    containerPort: 8080
    
# ── TLS configuration ──────────────────────────────────────────────────────
# mode:       "none"  → plain HTTP (no TLS)
#             "tls"   → one-way HTTPS (server cert only)
#             "mtls"  → mutual TLS   (server + CA verifies client cert)
# ──────────────────────────────────────────────────────────────────────────
tls:
  mode: mtls
  certDir: /etc/tls
  certFile: tls.crt
  keyFile: tls.key
  caFile: ca.crt 

serviceAccount:
  create: true

route:
  enabled: true
  host: ""

build:
  enabled: true
  git:
    uri: "https://github.com/glaceroy/smesh-api-backend.git"
    ref: main
    contextDir: "/"
  dockerfilePath: Dockerfile
  sourceSecret: git-secret

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 20