{{- if and .Values.ci.enabled .Values.ci.triggers.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common-api.fullname" . }}-github-webhook-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # Set this to a fixed value in values if you want deterministic secrets,
  # otherwise you can manage the secret outside Helm.
  secret: {{ default "changeme-github-webhook-secret" .Values.ci.triggers.webhookSecret | quote }}
{{- end }}
