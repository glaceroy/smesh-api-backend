{{- if and .Values.ci.enabled .Values.ci.triggers.enabled }}
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: {{ include "common-api.fullname" . }}-ci-template
  namespace: {{ .Release.Namespace }}
spec:
  params:
  - name: git-url
  - name: git-revision

  resourcetemplates:
  - apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: {{ include "common-api.fullname" . }}-ci-run-
      namespace: {{ .Release.Namespace }}
    spec:
      pipelineRef:
        name: {{ include "common-api.fullname" . }}-ci
      serviceAccountName: {{ .Values.ci.tekton.serviceAccountName | default "builder" }}
      workspaces:
      - name: shared-workspace
        volumeClaimTemplate:
          metadata:
            name: {{ include "common-api.fullname" . }}-ci-ws
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      params:
      - name: git-url
        value: $(tt.params.git-url)
      - name: git-revision
        # If your pipeline expects a branch name only, you can strip `refs/heads/` inside the task,
        # or change the binding logic. For now we pass the full ref.
        value: $(tt.params.git-revision)
{{- end }}
