apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common-api.fullname" . }}
  labels:
    {{- include "common-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "common-api.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "common-api.fullname" . }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "common-api.fullname" . }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}/{{ .Release.Namespace }}/{{ include "common-api.fullname" . }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            {{- range .Values.ports }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
            {{- end }}
          env:
            - name: PORT
              value: {{ .Values.containerPort | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.healthPort | quote }}
            - name: TLS_MODE
              value: {{ .Values.tls.mode | quote }}
            - name: TLS_CERT_DIR
              value: {{ .Values.tls.certDir | quote }}
            - name: TLS_CERT_FILE
              value: {{ .Values.tls.certFile | quote }}
            - name: TLS_KEY_FILE
              value: {{ .Values.tls.keyFile | quote }}
            {{- if eq .Values.tls.mode "mtls" }}
            - name: TLS_CA_FILE
              value: {{ .Values.tls.caFile | quote }}
            {{- end }}
          volumeMounts:
            {{- if ne .Values.tls.mode "none" }}
            - name: tls-certs
              mountPath: {{ .Values.tls.certDir }}
              readOnly: true
            {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if ne .Values.tls.mode "none" }}
        - name: tls-certs
          secret:
            secretName: {{ include "common-api.fullname" . }}-tls
            defaultMode: 0400
            items:
              - key: tls.crt
                path: {{ .Values.tls.certFile }}
              - key: tls.key
                path: {{ .Values.tls.keyFile }}
              {{- if eq .Values.tls.mode "mtls" }}
              - key: ca.crt
                path: {{ .Values.tls.caFile }}
              {{- end }}
        {{- end }}