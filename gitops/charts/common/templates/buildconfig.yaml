{{- if and .Values.build (default false .Values.build.enabled) }}
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: {{ include "common-api.fullname" . }}
  labels:
    app: {{ include "common-api.fullname" . }}
spec:
  output:
    to:
      kind: ImageStreamTag
      name: "{{ include "common-api.fullname" . }}:{{ .Values.image.tag }}"
  resources:
{{ toYaml .Values.resources | indent 4 }}
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: {{ .Values.build.dockerfilePath }}
      {{- if .Values.build.buildArgs }}
      buildArgs:
        {{- range .Values.build.buildArgs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
      {{- end }}
  source:
    type: Git
    git:
      uri: {{ .Values.build.git.uri }}
      ref: {{ .Values.build.git.ref }}
    contextDir: {{ .Values.build.git.contextDir }}
    sourceSecret:
      name: {{ .Values.build.sourceSecret }}
  triggers:
    - type: ConfigChange
  runPolicy: Serial
{{- end }}