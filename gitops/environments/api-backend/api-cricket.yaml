image:
  repository: image-registry.openshift-image-registry.svc:5000
  tag: v1.0

route:
  host: cricket-api.ocp.cloud.lab

build:
  buildArgs:
  - name: API_DIR
    value: api-cricket 

certificate:
  duration: 2880h
  renewBefore: 720h
  commonName: cricket-api.ocp.cloud.lab
  dnsNames:
    - cricket-api.ocp.cloud.lab
  issuerName: vault-cluster-issuer
  issuerKind: ClusterIssuer
  keyAlgorithm: RSA
  keySize: 2048