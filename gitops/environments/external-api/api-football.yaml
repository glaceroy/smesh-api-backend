image:
  repository: image-registry.openshift-image-registry.svc:5000/lbg-ocp-servicemesh-3-400-lab/api-football
  tag: latest

route:
  host: football-api.ocp.cloud.lab

build:
  git:
    contextDir: "api-football"

certificate:
  duration: 2880h
  renewBefore: 720h
  commonName: football-api.ocp.cloud.lab
  dnsNames:
    - football-api.ocp.cloud.lab
  issuerName: vault-cluster-issuer
  issuerKind: ClusterIssuer
  keyAlgorithm: RSA
  keySize: 2048